---
- name: Phase 3.5 - OSPFv2 Underlay Validation
  hosts: switches
  gather_facts: no

  tasks:
    # ------------------------------------------------
    # Re-derive own loopback IP (source for pings)
    # ------------------------------------------------
    - name: Extract numeric index from hostname
      set_fact:
        host_index: "{{ inventory_hostname | regex_replace('^\\D+', '') | int }}"

    - name: Set own loopback IP for leafs
      set_fact:
        loopback_ip: "{{ leaf_prefix }}{{ host_index }}"
      when: "'leaf' in inventory_hostname"

    - name: Set own loopback IP for spines
      set_fact:
        loopback_ip: "{{ spine_prefix }}{{ host_index }}"
      when: "'spine' in inventory_hostname"

    # ------------------------------------------------
    # Full mesh ping - derive target IPs from hostnames
    # ------------------------------------------------
    - name: Ping all other switches via source loopback
      shell: >
        ping -c 3 -W 2 -I {{ loopback_ip }}
        {{ (leaf_prefix if 'leaf' in item else spine_prefix) }}{{ item | regex_replace('^\D+', '') }}
      loop: "{{ groups['switches'] }}"
      when: item != inventory_hostname
      register: ping_results
      ignore_errors: yes
      changed_when: false

    # ------------------------------------------------
    # Collect failures only
    # ------------------------------------------------
    - name: Build failure list
      set_fact:
        ping_failures: >-
          {{
            ping_results.results
            | selectattr('rc', 'defined')
            | selectattr('rc', 'ne', 0)
            | map(attribute='item')
            | list
          }}

    # ------------------------------------------------
    # Per-device ping report - only show failures if any
    # ------------------------------------------------
    - name: Per-device ping report
      debug:
        msg: |

          ===== {{ inventory_hostname }} (source: {{ loopback_ip }}) =====
          Ping Result : {% if ping_failures | length == 0 %}PASS - all targets reachable{% else %}FAIL{% endif %}

          {% if ping_failures | length > 0 %}
          Unreachable targets:
          {% for target in ping_failures %}
            - {{ target }}
          {% endfor %}
          {% endif %}

    # ------------------------------------------------
    # OSPF neighbor table on every device
    # ------------------------------------------------
    - name: Get OSPF neighbor table
      shell: nv show vrf default router ospf neighbor
      register: ospf_neighbors
      changed_when: false

    - name: Per-device OSPF neighbor report
      debug:
        msg: |

          ===== {{ inventory_hostname }} OSPF Neighbors =====
          {{ ospf_neighbors.stdout }}

    # ------------------------------------------------
    # Collect per-device results into global fact
    # ------------------------------------------------
    - name: Store per-device result
      set_fact:
        device_result: "{{ 'PASS' if ping_failures | length == 0 else 'FAIL' }}"

  # ------------------------------------------------
  # Final summary - clean pass/fail per device
  # ------------------------------------------------
  post_tasks:
    - name: Collect all device results
      set_fact:
        all_results: >-
          {{
            ansible_play_hosts
            | map('extract', hostvars, 'device_result')
            | list
          }}
      run_once: true

    - name: Global validation summary
      run_once: true
      debug:
        msg: |

          ==========================================
               PHASE 3.5 VALIDATION SUMMARY
          ==========================================

          Ping reachability (full mesh via loopback):
          {% for host in ansible_play_hosts %}
            {{ host }}: {{ hostvars[host]['device_result'] }}
          {% endfor %}

          OSPF neighbor counts:
            Spines expected : 4 neighbors each
            Leafs  expected : 2 neighbors each

          {% if 'FAIL' not in all_results %}
          RESULT: ALL DEVICES PASSED - underlay is healthy, proceed to Phase 4
          {% else %}
          RESULT: ONE OR MORE DEVICES FAILED - investigate before proceeding
          {% endif %}
