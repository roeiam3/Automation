 
---
- name: Configure server bonds (Phase 6)
  hosts: servers
  become: true

  tasks:
    - name: Render netplan bond config
      ansible.builtin.template:
        src: templates/server-bond-netplan.j2
        dest: /etc/netplan/01-bond0.yaml
        owner: root
        group: root
        mode: '0600'
      notify: Apply netplan

  handlers:
    - name: Apply netplan
      become: true
      ansible.builtin.command: netplan apply

  post_tasks:
    - name: Check bond0 exists
      become: true
      ansible.builtin.command: ip -o link show {{ server_bond_name }}
      register: bond_link
      changed_when: false
      failed_when: bond_link.rc != 0

    - name: Check bond0 has correct IP
      become: true
      ansible.builtin.command: ip -o addr show {{ server_bond_name }}
      register: bond_addr
      changed_when: false
      failed_when: server_bond_ips[inventory_hostname] not in bond_addr.stdout