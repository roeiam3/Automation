---
- name: Phase 4 - eBGP Fabric
  hosts: switches
  gather_facts: no

  tasks:
    # ------------------------------------------------
    # Re-derive loopback IP and ASN from hostname
    # ------------------------------------------------
    - name: Extract numeric index from hostname
      set_fact:
        host_index: "{{ inventory_hostname | regex_replace('^\\D+', '') | int }}"

    - name: Set variables for leafs
      set_fact:
        loopback_ip: "{{ leaf_prefix }}{{ host_index }}"
        my_asn: "{{ leaf_asn_base + host_index | int }}"
      when: "'leaf' in inventory_hostname"

    - name: Set variables for spines
      set_fact:
        loopback_ip: "{{ spine_prefix }}{{ host_index }}"
        my_asn: "{{ spine_asn }}"
      when: "'spine' in inventory_hostname"

    # ------------------------------------------------
    # Step 1 - BGP global config: ASN + router-id
    # ------------------------------------------------
    - name: Set BGP ASN and router-id
      shell: |
        nv set router bgp autonomous-system {{ my_asn }}
        nv set router bgp router-id {{ loopback_ip }}
        nv set router bgp enable on
        nv config apply -y

    # ------------------------------------------------
    # Step 2 - Configure neighbors (leafs -> spines)
    # ------------------------------------------------
    - name: Configure BGP neighbors for leafs
      shell: |
        {% for spine in groups['spines'] %}
        {% set spine_idx = spine | regex_replace('^\D+', '') | int %}
        {% set spine_ip = spine_prefix + spine_idx | string %}
        nv set vrf default router bgp neighbor {{ spine_ip }} remote-as {{ spine_asn }}
        nv set vrf default router bgp neighbor {{ spine_ip }} update-source {{ loopback_ip }}
        nv set vrf default router bgp neighbor {{ spine_ip }} multihop-ttl 2
        nv set vrf default router bgp neighbor {{ spine_ip }} timers keepalive 3
        nv set vrf default router bgp neighbor {{ spine_ip }} timers hold 9
        nv set vrf default router bgp neighbor {{ spine_ip }} address-family ipv4-unicast enable on
        {% endfor %}
        nv config apply -y
      when: "'leaf' in inventory_hostname"

    # ------------------------------------------------
    # Step 3 - Configure neighbors (spines -> leafs)
    # ------------------------------------------------
    - name: Configure BGP neighbors for spines
      shell: |
        {% for leaf in groups['leafs'] %}
        {% set leaf_idx = leaf | regex_replace('^\D+', '') | int %}
        {% set leaf_ip = leaf_prefix + leaf_idx | string %}
        {% set leaf_asn = leaf_asn_base + leaf_idx %}
        nv set vrf default router bgp neighbor {{ leaf_ip }} remote-as {{ leaf_asn }}
        nv set vrf default router bgp neighbor {{ leaf_ip }} update-source {{ loopback_ip }}
        nv set vrf default router bgp neighbor {{ leaf_ip }} multihop-ttl 2
        nv set vrf default router bgp neighbor {{ leaf_ip }} timers keepalive 3
        nv set vrf default router bgp neighbor {{ leaf_ip }} timers hold 9
        nv set vrf default router bgp neighbor {{ leaf_ip }} address-family ipv4-unicast enable on
        {% endfor %}
        nv config apply -y
      when: "'spine' in inventory_hostname"

    # ------------------------------------------------
    # Step 4 - Advertise loopback into BGP
    # ------------------------------------------------
    - name: Advertise loopback prefix into BGP
      shell: |
        nv set vrf default router bgp address-family ipv4-unicast network {{ loopback_ip }}/32
        nv config apply -y

    # ------------------------------------------------
    # Step 5 - ECMP: multipath scaled to spine count
    # ------------------------------------------------
    - name: Set ECMP multipath to spine count
      shell: |
        nv set vrf default router bgp address-family ipv4-unicast multipaths ibgp {{ groups['spines'] | length }}
        nv set vrf default router bgp path-selection multipath aspath-ignore on
        nv config apply -y

    # ------------------------------------------------
    # Validation
    # ------------------------------------------------
    - name: Wait for BGP sessions to establish
      pause:
        seconds: 15
      run_once: true

    - name: Show BGP summary
      shell: nv show vrf default router bgp neighbor
      register: bgp_summary
      changed_when: false

    - name: Show BGP routes
      shell: nv show vrf default router bgp address-family ipv4-unicast route-export
      register: bgp_routes
      changed_when: false
      ignore_errors: yes

    - debug:
        msg: |

          ===== {{ inventory_hostname }} =====
          ASN       : {{ my_asn }}
          Router-ID : {{ loopback_ip }}

          --- BGP Neighbors ---
          {{ bgp_summary.stdout }}

          --- BGP Routes ---
          {{ bgp_routes.stdout }}
