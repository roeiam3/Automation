---
- name: Phase 3 - OSPFv2 Unnumbered Underlay
  hosts: switches
  gather_facts: no

  tasks:
    # ------------------------------------------------
    # Re-derive loopback IP (same logic as Phase 2)
    # ------------------------------------------------
    - name: Extract numeric index from hostname
      set_fact:
        host_index: "{{ inventory_hostname | regex_replace('^\\D+', '') | int }}"

    - name: Set variables for leafs
      set_fact:
        loopback_ip: "{{ leaf_prefix }}{{ host_index }}/32"
        router_id:   "{{ leaf_prefix }}{{ host_index }}"
        ospf_interfaces: >-
          {{
            range(0, groups['spines'] | length) | list
            | map('regex_replace', '^(.*)$', 'swp')
            | zip(range(64, 64 - groups['spines'] | length, -1) | map('string') | list)
            | map('join')
            | list
          }}
      when: "'leaf' in inventory_hostname"

    - name: Set variables for spines
      set_fact:
        loopback_ip: "{{ spine_prefix }}{{ host_index }}/32"
        router_id:   "{{ spine_prefix }}{{ host_index }}"
        ospf_interfaces: >-
          {{
            range(0, groups['leafs'] | length) | list
            | map('regex_replace', '^(.*)$', 'swp')
            | zip(range(64, 64 - groups['leafs'] | length, -1) | map('string') | list)
            | map('join')
            | list
          }}
      when: "'spine' in inventory_hostname"


    # ------------------------------------------------
    # Step 1 - Assign loopback IP to all fabric ports
    # ------------------------------------------------
    - name: Assign loopback IP to fabric-facing interfaces (unnumbered)
      shell: |
        {% for iface in ospf_interfaces %}
        nv set interface {{ iface }} ip address {{ loopback_ip }}
        {% endfor %}
        nv config apply -y

    # ------------------------------------------------
    # Step 2 - Enable OSPF globally, router-id, SPF timers
    # ------------------------------------------------
    - name: Enable OSPFv2 globally, set router-id and SPF timers
      shell: |
        nv set vrf default router ospf enable on
        nv set vrf default router ospf router-id {{ router_id }}
        nv set vrf default router ospf timers spf delay 1
        nv set vrf default router ospf timers spf holdtime 4
        nv set vrf default router ospf timers spf max-holdtime 4
        nv config apply -y

    # ------------------------------------------------
    # Step 3 - Enable OSPF on loopback (passive)
    # ------------------------------------------------
    - name: Configure loopback in OSPF area 0 (passive)
      shell: |
        nv set interface lo router ospf enable on
        nv set interface lo router ospf area 0
        nv set interface lo router ospf passive on
        nv config apply -y

    # ------------------------------------------------
    # Step 4 - Enable OSPF on fabric interfaces (p2p)
    # ------------------------------------------------
    - name: Configure fabric interfaces in OSPF area 0 (point-to-point)
      shell: |
        {% for iface in ospf_interfaces %}
        nv set interface {{ iface }} router ospf enable on
        nv set interface {{ iface }} router ospf area 0
        nv set interface {{ iface }} router ospf network-type point-to-point
        nv set interface {{ iface }} router ospf timers hello-interval 5
        nv set interface {{ iface }} router ospf timers dead-interval 60
        {% endfor %}
        nv config apply -y

    # ------------------------------------------------
    # Validation
    # ------------------------------------------------
    - name: Wait for OSPF adjacencies to form
      pause:
        seconds: 15
      run_once: true

    - name: Show OSPF neighbors
      shell: nv show vrf default router ospf neighbor
      register: ospf_neighbors
      changed_when: false

    - name: Show OSPF interface status
      shell: nv show vrf default router ospf interface
      register: ospf_interfaces_out
      changed_when: false

    - debug:
        msg: |

          ===== {{ inventory_hostname }} =====
          Router-ID : {{ router_id }}
          Loopback  : {{ loopback_ip }}

          --- OSPF Neighbors ---
          {{ ospf_neighbors.stdout }}

          --- OSPF Interfaces ---
          {{ ospf_interfaces_out.stdout }}
