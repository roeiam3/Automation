---
- name: Change all OSPF neighbor relationships to Point-to-Point
  hosts: all
  gather_facts: no

  tasks:
    - name: Get all active OSPF interfaces
      cisco.ios.ios_command:
        commands: "show ip ospf interface | include is up, line protocol"
      register: ospf_all_result

    - name: Get passive interfaces from protocols
      cisco.ios.ios_command:
        commands: show ip protocols
      register: protocols_result

    - name: Parse ALL OSPF interfaces
      set_fact:
        all_ospf_intfs: >-
          {{ ospf_all_result.stdout[0] 
             | regex_findall('(?m)^(\\S+) is up, line protocol') }}

    - name: Extract passive interfaces section
      set_fact:
        passive_section: >-
          {{ protocols_result.stdout[0]
             | regex_search('Passive Interface\(s\):((?:\n[ \t]+\S+)+)')
             or '' }}

    - name: Parse PASSIVE interfaces
      set_fact:
        passive_intfs: >-
          {{ passive_section | regex_findall('(?m)^[ \t]+(\S+)') }}

    - name: Filter out passive interfaces and loopbacks
      set_fact:
        active_ospf_intfs: >-
          {{ all_ospf_intfs
             | difference(passive_intfs)
             | reject('match', '^Loopback')
             | list }}

    - name: Debug - show interfaces that will be changed
      debug:
        msg: "Interfaces to configure P2P: {{ active_ospf_intfs }}"

    - name: Apply 'ip ospf network point-to-point' to active OSPF interfaces
      cisco.ios.ios_config:
        lines:
          - ip ospf network point-to-point
        parents: "interface {{ item }}"
      loop: "{{ active_ospf_intfs }}"
      when: active_ospf_intfs | length > 0
